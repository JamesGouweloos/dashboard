# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

  # Environment variables and secrets.
env:
  - variable: OPENWEATHER_API_KEY
    secret: OPENWEATHER_API_KEY
    availability:
      - BUILD
      - RUNTIME
  # Firebase Admin SDK credentials for Firestore access
  # Note: Secret name is FIREBASE_SERVICE_ACCOUNT_KEY but env var is SERVICE_ACCOUNT_KEY
  # (FIREBASE_ prefix is reserved, so Firebase CLI uses SERVICE_ACCOUNT_KEY)
  - variable: SERVICE_ACCOUNT_KEY
    secret: FIREBASE_SERVICE_ACCOUNT_KEY
    availability:
      - RUNTIME
